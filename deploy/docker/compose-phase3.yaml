services:
  expresso-calendar:
    image: expresso-calendar:latest
    container_name: expresso-calendar
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8002
    ports:
      - "8002:8002"

  expresso-contacts:
    image: expresso-contacts:latest
    container_name: expresso-contacts
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8003
    ports:
      - "8003:8003"

  expresso-drive:
    image: expresso-drive:latest
    container_name: expresso-drive
    restart: unless-stopped
    environment:
      RUST_LOG: info
