      PORT: 8004
    ports:
      - "8004:8004"

  expresso-flows:
    image: expresso-flows:latest
    container_name: expresso-flows
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8005
    ports:
      - "8005:8005"

  expresso-notifications:
    image: expresso-notifications:latest
    container_name: expresso-notifications
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8006
    ports:
      - "8006:8006"

  expresso-search:
    image: expresso-search:latest
    container_name: expresso-search
    restart: unless-stopped
    environment:
      RUST_LOG: info
