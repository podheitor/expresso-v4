global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'expresso-mail'
    static_configs:
      - targets: ['host.docker.internal:8001']

  - job_name: 'expresso-calendar'
    static_configs:
      - targets: ['host.docker.internal:8002']

  - job_name: 'expresso-drive'
    static_configs:
      - targets: ['host.docker.internal:8004']

  - job_name: 'expresso-auth'
    static_configs:
      - targets: ['host.docker.internal:8080']
