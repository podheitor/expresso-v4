# Prometheus scrape + alerting config — Expresso V4 template.
# Monte ops/prometheus/ em /etc/prometheus/ e ops/alertmanager/ separado.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: prod
    cluster: expresso-125

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: expresso-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - expresso-calendar:8002
          - expresso-contacts:8003
          - expresso-admin:8101
          - expresso-auth:8012
          - expresso-mail:8001
  - job_name: expresso-event-audit
    metrics_path: /metrics
    static_configs:
      - targets: [expresso-event-audit:9191]
  - job_name: nats
    static_configs:
      - targets: [prometheus-nats-exporter:7777]
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]
