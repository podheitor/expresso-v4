# Observability stack — Expresso V4 (deploy em 125)
# Deploy: sudo docker compose -f compose-observability.yaml up -d
# Usa rede externa expresso_default (criada pelo compose-phase3.yaml).
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: expresso-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prom-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - '127.0.0.1:9090:9090'
    networks: [expresso_default]
    extra_hosts:
      # host.docker.internal → host gateway, p/ alvos host-networked como event-audit
      - 'host.docker.internal:host-gateway'

  alertmanager:
    image: prom/alertmanager:latest
    container_name: expresso-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - am-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '127.0.0.1:9093:9093'
    networks: [expresso_default]

  expresso-nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    container_name: expresso-nats-exporter
    restart: unless-stopped
    command:
      - '-varz'
      - '-jsz=all'
      - '-port=7777'
      - 'http://expresso-nats:8222'
    networks: [expresso_default]


  grafana:
    image: grafana/grafana:latest
    container_name: expresso-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '127.0.0.1:3000:3000'
    networks: [expresso_default]
    depends_on: [prometheus]

volumes:
  prom-data:
  am-data:
  grafana-data:

networks:
  expresso_default:
    external: true
