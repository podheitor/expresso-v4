# Prometheus alerting rules — Expresso V4
# Carregar via `rule_files: [ alerts/expresso.yml ]` em prometheus.yml.
# Counters base: #31 (event-audit) + #32 (publishers). Ship #34.
groups:
  - name: expresso-nats-pipeline
    interval: 30s
    rules:
      - alert: ExpressoNatsPublishErrors
        expr: |
          sum(rate(calendar_nats_publish_total{result!="ok"}[5m]))
          + sum(rate(contacts_nats_publish_total{result!="ok"}[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
          component: nats-producer
        annotations:
          summary: "Publisher NATS com erros (>0.1/s por 5m)"
          description: "rate(publish{result!=ok}) sustentado acima de 0.1/s. Ver logs do serviço e broker."

      - alert: ExpressoNatsPublishErrorsCritical
        expr: |
          sum(rate(calendar_nats_publish_total{result!="ok"}[5m]))
          + sum(rate(contacts_nats_publish_total{result!="ok"}[5m]))
          > 1
        for: 5m
        labels:
          severity: critical
          component: nats-producer
        annotations:
          summary: "Publisher NATS em falha severa (>1/s por 5m)"
          description: "Taxa de erro de publish acima de 1/s. Pipeline provavelmente quebrado."

      - alert: ExpressoEventAuditLagCalendar
        expr: |
          sum(rate(calendar_nats_publish_total{result="ok"}[5m]))
          - sum(rate(event_audit_events_total{stream="EXPRESSO_CALENDAR"}[5m]))
          > 0.5
        for: 10m
        labels:
          severity: warning
          component: event-audit
        annotations:
          summary: "event-audit atrasado no stream EXPRESSO_CALENDAR"
          description: "publish(ok) − audit_consume > 0.5/s por 10m. Checar expresso-event-audit."

      - alert: ExpressoEventAuditLagContacts
        expr: |
          sum(rate(contacts_nats_publish_total{result="ok"}[5m]))
          - sum(rate(event_audit_events_total{stream="EXPRESSO_CONTACTS"}[5m]))
          > 0.5
        for: 10m
        labels:
          severity: warning
          component: event-audit
        annotations:
          summary: "event-audit atrasado no stream EXPRESSO_CONTACTS"
          description: "publish(ok) − audit_consume > 0.5/s por 10m. Checar expresso-event-audit."

      - alert: ExpressoEventAuditSilent
        expr: |
          (
            sum(rate(event_audit_events_total[5m])) == 0
            or absent(event_audit_events_total)
          )
          and
          (
            sum(rate(calendar_nats_publish_total{result="ok"}[5m]))
            + sum(rate(contacts_nats_publish_total{result="ok"}[5m]))
          ) > 0
        for: 15m
        labels:
          severity: critical
          component: event-audit
        annotations:
          summary: "expresso-event-audit silencioso com publishers ativos"
          description: "Produtores publicando mas audit sem eventos por 15m — consumer morto ou desconectado."

  - name: expresso-service-health
    interval: 30s
    rules:
      - alert: ExpressoServiceDown
        expr: up{job=~"expresso-.*"} == 0
        for: 2m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Serviço Expresso down: {{ $labels.job }} ({{ $labels.instance }})"
          description: "up=0 por 2m. Checar container + /readyz."

      - alert: ExpressoHttp5xxHigh
        expr: |
          sum by (service) (rate(http_requests_total{status=~"5.."}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          component: service
        annotations:
          summary: "5xx rate alto em {{ $labels.service }}"
          description: "rate(http_requests_total{status=~\"5..\"}) > 0.5/s por 5m."

      - alert: ExpressoRateLimitedSpike
        expr: |
          sum by (service) (rate(http_requests_total{status="429"}[5m])) > 1
        for: 10m
        labels:
          severity: info
          component: rate-limit
        annotations:
          summary: "429 spike em {{ $labels.service }}"
          description: "Rate-limit per-tenant saturado. Avaliar limites ou abuso."

  - name: expresso-nats-broker
    interval: 30s
    rules:
      - alert: ExpressoJetStreamStalled
        expr: |
          (
            (nats_stream_messages{stream=~"EXPRESSO_.*"}
              - (nats_stream_messages{stream=~"EXPRESSO_.*"} offset 10m)) == 0
          )
          and on() (
            sum(rate(calendar_nats_publish_total{result="ok"}[5m]))
            + sum(rate(contacts_nats_publish_total{result="ok"}[5m]))
          ) > 0
        for: 15m
        labels:
          severity: warning
          component: nats-broker
        annotations:
          summary: "Stream {{ $labels.stream }} não cresce com publishers ativos"
          description: "messages total estável por 10m+ mas produtores com rate>0. Broker pode estar rejeitando."

  - name: expresso-imip-dispatch
    interval: 30s
    rules:
      - alert: ExpressoImipSendErrors
        expr: |
          sum(rate(imip_dispatch_total{result="send_err"}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          component: imip-dispatch
        annotations:
          summary: "iMIP dispatch falhando no SMTP (>0.05/s por 10m)"
          description: "Dispatcher consegue parsear envelope mas SMTP relay rejeita. Checar postfix maillog e conectividade expresso-imip-dispatch -> SMTP_HOST."

      - alert: ExpressoImipParseErrors
        expr: |
          sum(increase(imip_dispatch_total{result="parse_err"}[5m])) > 5
        for: 0m
        labels:
          severity: warning
          component: imip-dispatch
        annotations:
          summary: "iMIP envelopes malformados (>5 em 5m)"
          description: "Publishers em expresso.imip.request estão emitindo payload inválido. Verificar fonte do evento (calendar service?)."

      - alert: ExpressoImipDispatcherDown
        expr: |
          up{job=~".*imip.*"} == 0
        for: 5m
        labels:
          severity: critical
          component: imip-dispatch
        annotations:
          summary: "Dispatcher iMIP offline (5m+)"
          description: "expresso-imip-dispatch não responde ao scrape. Convites calendar não estão saindo por SMTP."

  - name: expresso-auth-multirealm
    rules:
    - alert: ExpressoAuthValidationErrorsHigh
      expr: sum by (realm) (rate(auth_validation_total{result!~"ok|missing_bearer"}[5m])) > 0.1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Auth validation error rate high (realm: {{ $labels.realm }})"
        description: "Per-tenant JWT validation errors > 0.1/s for {{ $labels.realm }} over 10m."
    - alert: ExpressoAuthNoRealmsLoaded
      expr: auth_realm_cache_size == 0
      for: 15m
      labels:
        severity: info
      annotations:
        summary: "Multi-realm cache empty"
        description: "auth_realm_cache_size=0 for 15m — no tenants validated (unusual for prod)."

  - name: expresso-smoke-multirealm
    rules:
      - alert: ExpressoSmokeMultirealmFailing
        expr: expresso_smoke_multirealm_success == 0
        for: 15m
        labels:
          severity: warning
          component: auth
        annotations:
          summary: "Smoke multi-realm falhando (tenant={{ $labels.tenant }})"
          description: "expresso_smoke_multirealm_success==0 por 15m — JWT/auth_me/metric cadeia quebrou p/ tenant {{ $labels.tenant }}."

      - alert: ExpressoSmokeMultirealmStale
        expr: time() - expresso_smoke_multirealm_last_run_timestamp_seconds > 1800
        for: 5m
        labels:
          severity: warning
          component: auth
        annotations:
          summary: "Smoke multi-realm sem execução há >30min (tenant={{ $labels.tenant }})"
          description: "Timer systemd parado ou pushgateway indisponível. Conferir journalctl -u expresso-smoke-multirealm."

  - name: expresso-mail-auth
    rules:
      - alert: ExpressoDmarcRejectSurge
        expr: sum(rate(mail_auth_actions_total{action="reject"}[10m])) > 0.05
        for: 10m
        labels:
          severity: warning
          component: mail
        annotations:
          summary: "Surge em rejeições DMARC (>3/min por 10m)"
          description: "Taxa de {{ $value | humanize }}/s mensagens rejeitadas por DMARC p=reject. Pode indicar spoofing real ou quebra de config DKIM/SPF do remetente."

      - alert: ExpressoMailAuthTempErrorHigh
        expr: sum(rate(mail_auth_checks_total{result="temperror"}[10m])) / clamp_min(sum(rate(mail_auth_checks_total[10m])), 1) > 0.2
        for: 15m
        labels:
          severity: warning
          component: mail
        annotations:
          summary: ">20% das verificações auth retornando temperror"
          description: "DNS upstream ou rede do milter/mail com problema: {{ $value | humanizePercentage }} temperror rate."

      - alert: ExpressoDmarcQuarantineSurge
        expr: sum(rate(mail_auth_actions_total{action="quarantine"}[10m])) > 0.1
        for: 10m
        labels:
          severity: info
          component: mail
        annotations:
          summary: "Surge em quarentenas DMARC (>6/min por 10m)"
          description: "{{ $value | humanize }}/s mensagens entrando na hold queue do Postfix por DMARC p=quarantine. Rever se legítimo vs. spoof."
