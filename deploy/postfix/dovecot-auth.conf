# Dovecot SASL-only — Keycloak password grant bridge (A9)
import_environment = TZ PATH CORE_OUTOFMEM CORE_ERROR KC_URL KC_REALM KC_CLIENT_ID KC_CLIENT_SECRET
protocols =
listen = *
base_dir = /var/run/dovecot
log_path = /dev/stdout
info_log_path = /dev/stdout

auth_mechanisms = plain login
disable_plaintext_auth = no

passdb {
  driver = checkpassword
  args = /usr/local/bin/kc-verify.sh
}
userdb {
  driver = static
  args = uid=65534 gid=65534 home=/tmp
}

service auth {
  unix_listener /var/spool/postfix/private/auth {
    user = postfix
    group = postfix
    mode = 0660
  }
}

service auth-worker {
  user = root
}
