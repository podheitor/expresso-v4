# Observability stack — Expresso V4 (sprint #35 deploy template)
# Deploy: sudo docker compose -f compose-observability.yaml up -d
# Requer rede externa expresso-net (compartilhada com serviços).
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: expresso-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prom-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - '127.0.0.1:9090:9090'
    networks: [expresso-net]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: expresso-alertmanager
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - am-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - '127.0.0.1:9093:9093'
    networks: [expresso-net]

  prometheus-nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    container_name: expresso-nats-exporter
    restart: unless-stopped
    command:
      - '-varz'
      - '-jsz=all'
      - '-port=7777'
      - 'http://expresso-nats:8222'
    ports:
      - '127.0.0.1:7777:7777'
    networks: [expresso-net]

volumes:
  prom-data:
  am-data:

networks:
  expresso-net:
    external: true
