# Prometheus scrape + alerting — Expresso V4 (prod 125)
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: prod
    cluster: expresso-125

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: expresso-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - expresso-calendar:8002
          - expresso-contacts:8003
          - expresso-admin:8101
  - job_name: expresso-event-audit
    metrics_path: /metrics
    # event-audit runs with --network host
    static_configs:
      - targets: ['172.17.0.1:9191']
  - job_name: nats
    static_configs:
      - targets: ['expresso-nats-exporter:7777']
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
