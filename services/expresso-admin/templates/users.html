{% extends "base.html" %}
{% block content %}
<section class="hero">
  <h1>Usuários</h1>
  <p class="muted">Realm <code>{{ realm_name }}</code></p>
  <p><a class="btn primary" href="/users/new">+ Novo usuário</a></p>
</section>
<table class="tbl">
  <thead><tr><th>Username</th><th>Email</th><th>Nome</th><th>Status</th><th>ID</th><th></th></tr></thead>
  <tbody>
    {% for u in users %}
    <tr>
      <td><a href="/users/{{ u.id }}/edit"><strong>{{ u.username }}</strong></a></td>
      <td>{{ u.email }}</td>
      <td>{{ u.full_name }}</td>
      <td>{% if u.enabled %}<span class="pill ok">ativo</span>{% else %}<span class="pill off">desativado</span>{% endif %}</td>
      <td class="mono">{{ u.id }}</td>
      <td><a class="btn small" href="/users/{{ u.id }}/edit">editar</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
