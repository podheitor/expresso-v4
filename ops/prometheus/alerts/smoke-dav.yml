# Alertas DAV multi-realm — apenso a /etc/prometheus/alerts/expresso.yml em prod 125
# (arquivo fonte de documentação; prod aplicado via /tmp/patch-alerts-dav.py)
groups:
  - name: expresso-smoke-dav
    rules:
      - alert: ExpressoSmokeDavFailing
        expr: expresso_smoke_dav_success == 0
        for: 15m
        labels:
          severity: warning
          component: dav
        annotations:
          summary: "Smoke DAV falhando (tenant={{ $labels.tenant }}, service={{ $labels.service }})"
          description: "expresso_smoke_dav_success==0 por 15m — calendar/contacts quebrado p/ tenant {{ $labels.tenant }} service {{ $labels.service }}."

      - alert: ExpressoSmokeDavStale
        expr: time() - expresso_smoke_dav_last_run_timestamp_seconds > 1800
        for: 5m
        labels:
          severity: warning
          component: dav
        annotations:
          summary: "Smoke DAV sem execução há >30min (tenant={{ $labels.tenant }}, service={{ $labels.service }})"
          description: "Timer systemd parado ou pushgateway indisponível. Conferir journalctl -u expresso-smoke-dav."
