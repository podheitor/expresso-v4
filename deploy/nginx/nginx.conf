worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 100m;

  # Logging JSON-ish
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" "$host"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # HTTP → HTTPS redirect
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # Shared TLS
  ssl_certificate     /etc/nginx/tls/expresso.crt;
  ssl_certificate_key /etc/nginx/tls/expresso.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Proxy headers (shared)
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_set_header Upgrade           $http_upgrade;
  proxy_set_header Connection        $connection_upgrade;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── expresso.local → expresso-web (SSR) + /auth → expresso-auth-rp ──
  server {
    listen 443 ssl default_server;
    http2 on;
    server_name expresso.local www.expresso.local _;
    # OIDC auth flow (login/callback/refresh/logout/me)
    location /auth/ {
      proxy_pass http://expresso-auth-rp:8012/auth/;
      proxy_read_timeout 60s;
    }
    location / {
      proxy_pass http://expresso-web:8080;
      proxy_read_timeout 300s;
    }
  }

  # ── auth.expresso.local → keycloak ──
  server {
    listen 443 ssl;
    http2 on;
    server_name auth.expresso.local;
    location / {
      proxy_pass http://expresso-keycloak:8080;
      proxy_buffer_size   16k;
      proxy_buffers       8 16k;
      proxy_busy_buffers_size 32k;
    }
  }

  # ── admin.expresso.local → expresso-admin ──
  server {
    listen 443 ssl;
    http2 on;
    server_name admin.expresso.local;
    location / {
      proxy_pass http://expresso-admin:8101;
    }
  }
}
