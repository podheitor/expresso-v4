  expresso-wopi:
    image: expresso-wopi:latest
    container_name: expresso-wopi
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8008
    ports:
      - "8008:8008"

  expresso-compliance:
    image: expresso-compliance:latest
    container_name: expresso-compliance
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8009
    ports:
      - "8009:8009"

  expresso-auth:
    image: expresso-auth:latest
    container_name: expresso-auth
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8100
    ports:
      - "8100:8100"

  expresso-admin:
    image: expresso-admin:latest
    container_name: expresso-admin
    restart: unless-stopped
    environment:
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 8101
    ports:
      - "8101:8101"

  expresso-chat:
    image: expresso-chat:latest
    container_name: expresso-chat
    restart: unless-stopped
    environment:
      RUST_LOG: info
      SERVER__HOST: 0.0.0.0
      SERVER__PORT: 8010
      TELEMETRY__LOG_FILTER: info
      # DATABASE__URL, MATRIX__HS_URL, MATRIX__SERVER_NAME,
      # MATRIX__AS_TOKEN, MATRIX__ADMIN_TOKEN injected via env file at deploy.
    ports:
      - "8010:8010"
